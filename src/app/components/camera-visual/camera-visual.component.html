<div class="camera-parallax-layer" [style.opacity]="cameraOpacity()" [style.transform]="parallaxTransform()">
    <div class="camera-wrapper">

        <!-- Loading progress bar (auto-hides at 100%) -->
        <div class="load-bar-wrap" [class.hidden]="loadProgress() >= 100">
            <div class="load-bar" [style.width]="loadProgress() + '%'"></div>
        </div>

        <div class="camera-hud" [style.transform]="cameraTransform()">
            <div class="target-corner top-left"></div>
            <div class="target-corner bottom-right"></div>
            <div class="rec-info">
                <span class="dot"></span>
                REC // 00:{{currentSec()}}:{{currentMs()}}
            </div>
            <div class="scanning-line"></div>
        </div>

        <canvas #cameraCanvas class="sequence-canvas" [style.transform]="cameraTransform()"></canvas>

    </div>
</div>
