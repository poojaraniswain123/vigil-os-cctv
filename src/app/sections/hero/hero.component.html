<section id="home" class="hero-container" [@contentFadeIn]>
    <div class="scanline"></div>

    @if (!isBooted()) {
    <div class="boot-terminal">
        <div class="terminal-box">
            <span class="prompt">> </span>{{ bootText() }}
            <span class="cursor-blink">_</span>
        </div>
    </div>
    }

    <div class="aperture-overlay" [class.open]="isBooted()">
        <div class="blade b1"></div>
        <div class="blade b2"></div>
        <div class="blade b3"></div>
        <div class="blade b4"></div>
        <div class="blade b5"></div>
        <div class="blade b6"></div>
    </div>

    <div class="hud-wrapper">
        <div class="hero-middle">

            <div class="hero-content">
                <h1 class="hud-element">INTELLIGENT<br><span class="accent-text">SURVEILLANCE</span> ARCHITECTURE</h1>
                <p class="hud-element">Autonomous threat analytics. High-precision tactical tracking hardware.
                    Enterprise
                    network security matrices.</p>
                <div class="cta-group hud-element">
                    <a href="#services" class="btn btn-primary">INITIALIZE DEPLOYMENT</a>
                    <a href="#live-feed" class="btn btn-secondary">VIEW ARCHIVE // ACTIVE</a>
                </div>
            </div>

            <div class="hero-visuals hud-element">
                <app-camera-visual></app-camera-visual>
            </div>

        </div>
    </div>
</section>
