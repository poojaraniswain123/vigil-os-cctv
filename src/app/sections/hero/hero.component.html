<section class="hero-container">

    <canvas #particlesCanvas class="particles"></canvas>

    <div class="grid"></div>

    <div class="hero-middle">

        <!-- LEFT CONTENT -->

        <div class="hero-content">

            <div class="status-chip">
                <span class="dot"></span>
                AI CCTV SECURITY ACTIVE
            </div>

            <h1>
                INTELLIGENT
                <span class="accent-text">SURVEILLANCE</span>
                SYSTEM
            </h1>

            <p>
                Autonomous threat analytics with AI-powered
                monitoring and high precision CCTV tracking.
            </p>

            <div class="cta-group">

                <button class="btn btn-primary">
                    INITIALIZE
                </button>

                <button class="btn btn-secondary">
                    VIEW LIVE
                </button>

            </div>

        </div>

        <!-- RIGHT CAMERA -->

        <div class="hero-visuals">

            <div class="camera-wrapper">

                <!-- Rings -->

                <div class="ring ring1"></div>
                <div class="ring ring2"></div>
                <div class="ring ring3"></div>

                <!-- Camera -->

                <div
                    class="camera"
                    [ngClass]="cameraPosition"
                    (click)="changeAngle()"
                >

                    <div class="mount"></div>

                    <div class="body">

                        <div class="shine"></div>

                        <div class="indicator i1"></div>
                        <div class="indicator i2"></div>

                        <div class="lens-box">

                            <div class="lens-outer">

                                <div class="lens">
                                    <div class="scan"></div>
                                </div>

                            </div>

                        </div>

                    </div>

                    <div class="laser"></div>

                </div>

                <!-- HUD -->

                <div class="hud hud1">
                    AI TRACKING ACTIVE
                </div>

                <div class="hud hud2">
                    FACE DETECTION 99%
                </div>

            </div>

        </div>

    </div>

</section>
