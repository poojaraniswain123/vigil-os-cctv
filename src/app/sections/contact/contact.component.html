<section class="contact-section" id="contact">

    <div class="radar-bg">
        <div class="radar-sweep"></div>
        <div class="radar-ring r1"></div>
        <div class="radar-ring r2"></div>
        <div class="radar-ring r3"></div>
        <div class="radar-grid"></div>
    </div>

    <div class="contact-container">
        <div class="section-header">
            <div class="header-glitch" data-text="SECURE COMMUNIQUE">SECURE COMMUNIQUE</div>
            <p>Establish a direct encrypted uplink with our deployment team.</p>
        </div>

        <form class="cyber-form" (submit)="onSubmit($event)">

            @if (formState() === 'success') {
            <div class="success-message">
                <span class="icon">✓</span>
                UPLINK ESTABLISHED. OUR AGENTS WILL CONTACT YOU SHORTLY.
            </div>
            }
            @else {
            <div class="form-group">
                <label>OPERATIVE IDENTIFICATION</label>
                <input type="text" placeholder="ENTER NAME / CALLSIGN" required
                    [disabled]="formState() === 'transmitting'">
            </div>

            <div class="form-group">
                <label>ENCRYPTED FREQUENCY (EMAIL)</label>
                <input type="email" placeholder="ENTER EMAIL ADDRESS" required
                    [disabled]="formState() === 'transmitting'">
            </div>

            <div class="form-group">
                <label>MISSION PARAMETERS</label>
                <textarea placeholder="DESCRIBE YOUR PERIMETER OR NETWORK VULNERABILITIES" required
                    [disabled]="formState() === 'transmitting'"></textarea>
            </div>

            <button type="submit" class="btn-primary w-100" [disabled]="formState() === 'transmitting'">
                {{ formState() === 'transmitting' ? 'ENCRYPTING DATA...' : 'TRANSMIT SIGNAL' }}
            </button>
            }

        </form>
    </div>
</section>
