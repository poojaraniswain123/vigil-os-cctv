<!-- hero.component.html -->

<section class="hero-container">

  <!-- PARTICLES -->

  <canvas #particlesCanvas></canvas>

  <!-- GRID -->

  <div class="grid"></div>

  <div class="hero-middle">

    <!-- LEFT -->

    <div class="hero-content">

      <div class="status-chip">
        AI CCTV SECURITY ACTIVE
      </div>

      <h1>

        INTELLIGENT <br>

        <span class="accent-text">
          SURVEILLANCE
        </span>

        ARCHITECTURE

      </h1>

      <p>
        Autonomous threat analytics.
        High precision tactical tracking.
        Enterprise network protection.
      </p>

      <div class="cta-group">

        <a class="btn btn-primary">
          INITIALIZE DEPLOYMENT
        </a>

        <a class="btn btn-secondary">
          VIEW ARCHIVE
        </a>

      </div>

    </div>

    <!-- RIGHT -->

    <div class="hero-visuals">

      <div class="camera-wrapper">

        <!-- RINGS -->

        <div class="ring ring1"></div>
        <div class="ring ring2"></div>
        <div class="ring ring3"></div>

        <!-- CAMERA -->

        <div
          class="camera"

          [class.left]="cameraPosition() === 'left'"

          [class.center]="cameraPosition() === 'center'"

          [class.right]="cameraPosition() === 'right'"

          (click)="changeCameraAngle()">

          <!-- MOUNT -->

          <div class="mount"></div>

          <!-- BODY -->

          <div class="body">

            <div class="shine"></div>

            <div class="indicator i1"></div>

            <div class="indicator i2"></div>

            <!-- LENS -->

            <div class="lens-box">

              <div class="lens-outer">

                <div class="lens">

                  <div class="scan"></div>

                </div>

              </div>

            </div>

          </div>

          <!-- LASER -->

          <div class="laser"></div>

        </div>

      </div>

    </div>

  </div>

</section>
