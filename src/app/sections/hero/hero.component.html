<section id="home" class="hero-container">

    <!-- particles -->
    <canvas #particlesCanvas class="particles-canvas"></canvas>

    <!-- futuristic grid -->
    <div class="grid"></div>

    <div class="hero-middle">

        <!-- LEFT CONTENT -->

        <div class="hero-content">

            <div class="status-chip hud-element">
                AI CCTV SECURITY ACTIVE
            </div>

            <h1 class="hud-element">
                INTELLIGENT<br>

                <span class="accent-text">
                    SURVEILLANCE
                </span>

                ARCHITECTURE
            </h1>

            <p class="hud-element">
                Autonomous threat analytics.
                High-precision tactical tracking hardware.
                Enterprise network security matrices.
            </p>

            <div class="cta-group hud-element">

                <a href="#"
                    class="btn btn-primary">
                    INITIALIZE DEPLOYMENT
                </a>

                <a href="#"
                    class="btn btn-secondary">
                    VIEW ARCHIVE // ACTIVE
                </a>

            </div>

        </div>

        <!-- RIGHT CAMERA -->

        <div class="hero-visuals hud-element">

            <div class="camera-wrapper">

                <!-- rings -->

                <div class="ring ring1"></div>
                <div class="ring ring2"></div>
                <div class="ring ring3"></div>

                <!-- camera -->

                <div class="camera"
                    [ngClass]="cameraAngle()"
                    [style.transform]="cameraTransform()"
                    (click)="changeAngle()">

                    <!-- mount -->
                    <div class="mount"></div>

                    <!-- body -->
                    <div class="body">

                        <div class="shine"></div>

                        <!-- indicators -->
                        <div class="indicator i1"></div>
                        <div class="indicator i2"></div>

                        <!-- lens -->
                        <div class="lens-box">

                            <div class="lens-outer">

                                <div class="lens">

                                    <div class="scan"></div>

                                </div>

                            </div>

                        </div>

                    </div>

                    <!-- laser -->
                    <div class="laser"></div>

                </div>

                <!-- hud -->

                <div class="hud hud1">
                    AI TRACKING ACTIVE
                </div>

                <div class="hud hud2">
                    FACE DETECTION : 99%
                </div>

                <div class="hud hud3">
                    LIVE CCTV MONITORING
                </div>

            </div>

        </div>

    </div>

</section>
